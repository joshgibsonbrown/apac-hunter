<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ brief.individual_name }} — Template Analysis</title>
  <style>
    body { font-family: Georgia, serif; background: #f5f5f5; margin: 0; color: #151515; }
    .header { background: #151515; color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
    .header a { color: #A5A5A5; text-decoration: none; margin-left: 20px; }
    .header a:hover { color: white; }
    .container { max-width: 1120px; margin: 0 auto; padding: 32px; }
    .hero, .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .hero h1 { margin: 0 0 6px 0; font-size: 28px; font-weight: 400; }
    .hero p { margin: 0; color: #696969; font-size: 14px; }
    .button { display: inline-block; background: #FDC500; color: #151515; border: none; border-radius: 6px; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: Georgia, serif; }
    .muted { color: #696969; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .metric { background: #fafafa; border: 1px solid #e5e5e5; border-radius: 6px; padding: 16px; }
    .metric-label { font-size: 12px; color: #696969; margin-bottom: 6px; }
    .metric-value { font-size: 24px; font-weight: 600; }
    .pill { display: inline-block; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; margin-bottom: 12px; }
    .section-title { font-size: 18px; margin: 0 0 14px 0; }
    ul { padding-left: 20px; }
    li { margin-bottom: 8px; }
    .hidden { display: none; }
    .quote { border-left: 4px solid #1A7CD7; padding-left: 16px; font-size: 20px; line-height: 1.5; }
    .loading { color: #696969; }
    .error { color: #c0392b; }
    .footer-note { font-size: 12px; color: #A5A5A5; margin-top: 12px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; white-space: pre-wrap; }
    @media (max-width: 900px) { .grid, .grid-3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header"><div><strong>ICONIQ</strong></div><div><a href="/brief/{{ brief.id }}">← Brief</a><a href="/">Dashboard</a></div></div>
  <div class="container">
    <div class="hero"><h1>{{ brief.individual_name }}</h1><p>{{ brief.last_trigger_type }} · Deterministic template analysis</p></div>
    <div id="generate-box" class="card"><h2 class="section-title">Run template analysis</h2><p class="muted">Deterministic templates now support control, liquidity sequencing, and IPO liquidity.</p><button class="button" onclick="runAnalysis()">Generate Analysis</button></div>
    <div id="loading-box" class="card hidden"><h2 class="section-title">Generating...</h2><p class="loading">Building deterministic template output.</p></div>
    <div id="error-box" class="card hidden"><h2 class="section-title">Error</h2><p id="error-text" class="error"></p></div>
    <div id="result-box" class="hidden"></div>
  </div>
  <script>
    const briefId = "{{ brief.id }}";
    const esc = text => String(text || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const fmtNumber = x => x === null || x === undefined ? "—" : Number(x).toLocaleString();
    const fmtPct = x => x === null || x === undefined ? "—" : Number(x).toFixed(2) + "%";
    const fmtMoney = x => x === null || x === undefined ? "—" : "$" + Number(x).toLocaleString(undefined,{maximumFractionDigits:0});

    function renderControl(result) {
      const a = result.analysis, i = a.insight;
      return `<div class="card"><div class="pill" style="background:#eaf3ff;color:#1A7CD7;">${a.template_type}</div><div class="quote">${esc(i.interpretation)}</div></div>
      <div class="grid"><div class="card"><h2 class="section-title">Control</h2><ul><li>Pre voting: ${fmtPct(i.control_shift.pre_voting_pct)}</li><li>Post voting: ${fmtPct(i.control_shift.post_voting_pct)}</li><li>Delta: ${fmtPct(i.control_shift.delta)}</li></ul></div>
      <div class="card"><h2 class="section-title">Liquidity</h2><ul><li>Pre max sellable: ${fmtNumber(a.pre.max_sellable)}</li><li>Post max sellable: ${fmtNumber(a.post.max_sellable)}</li><li>Unlock multiple: ${a.insight.liquidity_unlock.multiple}x</li></ul></div></div>`;
    }

    function renderLiquidity(result) {
      const a = result.analysis;
      return `<div class="card"><div class="pill" style="background:#eef8ee;color:#1E8449;">${a.template_type}</div><div class="quote">${esc(a.insight.interpretation)}</div></div>
      <div class="grid-3"><div class="card"><div class="metric"><div class="metric-label">Shares sold</div><div class="metric-value">${fmtNumber(a.observed.shares_sold)}</div></div></div><div class="card"><div class="metric"><div class="metric-label">Price per share</div><div class="metric-value">${fmtMoney(a.observed.price_per_share)}</div></div></div><div class="card"><div class="metric"><div class="metric-label">Estimated proceeds</div><div class="metric-value">${fmtMoney(a.observed.estimated_proceeds)}</div></div></div></div>
      <div class="card"><h2 class="section-title">Scenario defaults</h2><div class="mono">${esc(JSON.stringify(a.scenario_defaults, null, 2))}</div></div>`;
    }

    function renderIPO(result) {
      const a = result.analysis;
      return `<div class="card"><div class="pill" style="background:#fff4db;color:#9A6700;">${a.template_type}</div><div class="quote">${esc(a.insight.interpretation)}</div></div>
      <div class="grid-3"><div class="card"><div class="metric"><div class="metric-label">Offer price</div><div class="metric-value">${fmtMoney(a.observed.offer_price)}</div></div></div><div class="card"><div class="metric"><div class="metric-label">Shares offered</div><div class="metric-value">${fmtNumber(a.observed.shares_offered)}</div></div></div><div class="card"><div class="metric"><div class="metric-label">Gross proceeds</div><div class="metric-value">${fmtMoney(a.observed.gross_proceeds)}</div></div></div></div>
      <div class="grid"><div class="card"><h2 class="section-title">Scenario defaults</h2><div class="mono">${esc(JSON.stringify(a.scenario_defaults, null, 2))}</div></div><div class="card"><h2 class="section-title">Risk flags</h2><ul>${(a.insight.risk_flags || []).map(x => `<li>${esc(x)}</li>`).join("")}</ul></div></div>`;
    }

    function renderGeneric(result) { return `<div class="card"><h2 class="section-title">Template not yet implemented</h2><p class="muted">${esc(result.note || 'No deterministic template exists yet for this brief.')}</p></div>`; }

    function runAnalysis() {
      document.getElementById("generate-box").classList.add("hidden");
      document.getElementById("error-box").classList.add("hidden");
      document.getElementById("loading-box").classList.remove("hidden");
      fetch("/analysis/" + briefId + "/generate", { method: "POST" })
        .then(r => r.json())
        .then(data => {
          document.getElementById("loading-box").classList.add("hidden");
          if (!data.success) throw new Error(data.error || "Unknown error");
          const result = data.result;
          let html = "";
          if (result.status === "ok" && result.analysis) {
            if (result.analysis.template_type === "control_transition") html = renderControl(result);
            else if (result.analysis.template_type === "liquidity_sequencing") html = renderLiquidity(result);
            else if (result.analysis.template_type === "ipo_liquidity") html = renderIPO(result);
            else html = renderGeneric(result);
          } else html = renderGeneric(result);
          document.getElementById("result-box").innerHTML = html;
          document.getElementById("result-box").classList.remove("hidden");
        })
        .catch(err => {
          document.getElementById("loading-box").classList.add("hidden");
          document.getElementById("error-text").textContent = err.message;
          document.getElementById("error-box").classList.remove("hidden");
          document.getElementById("generate-box").classList.remove("hidden");
        });
    }
  </script>
</body>
</html>
